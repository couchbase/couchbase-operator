---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-user
spec:
  template:
    metadata:
      name: create-user
    spec:
      containers:
      - name: couchbase-cli
        image: sequoiatools/couchbase-cli:v5.0.1
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "couchbase-cli-secure user-manage
                              -c cb-example-0000.cb-example.myproject.svc
                              -u {auth.admin.username}
                              -p {auth.admin.password}
                              --rbac-username {auth.users.default_user}
                              --rbac-password {auth.users.default_password}
                              --roles admin --auth-domain local --set"]
        volumeMounts:
          - name: cb-admin
            mountPath: "/auth/admin"
          - name: cb-users
            mountPath: "/auth/users"
      volumes:
        - name: cb-admin
          secret:
            secretName: cb-example-auth
        - name: cb-users
          secret:
            secretName: cb-user-auth
      restartPolicy: Never
