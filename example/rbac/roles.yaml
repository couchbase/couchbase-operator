---
apiVersion: couchbase.com/v2
kind: CouchbaseUser
metadata:
  name: developer
spec:
  fullName: Administrator
  authDomain: local
  authSecret: cb-example-auth
---
apiVersion: couchbase.com/v2
kind: CouchbaseGroup
metadata:
  name: admin-group
spec:
  roles:
  - name: cluster_admin
  - name: bucket_admin
    bucket: default
  ldapGroupRef: cn=mygroup,ou=Groups,dc=example,dc=com
---
apiVersion: couchbase.com/v2
kind: CouchbaseRoleBinding
metadata:
  name: admin-role-binding
spec:
  roleRef:
    kind: CouchbaseGroup
    name: admin-group
  subjects:
  - kind: CouchbaseUser
    name: developer
