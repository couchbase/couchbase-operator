apiVersion: "couchbase.database.couchbase.com/v1"
kind: "CouchbaseCluster"
metadata:
  name: cb-example
  namespace: default
spec:
  baseImage: couchbase/server
  version: "enterprise-4.5.1"
  paused: false
  antiAffinity: true
  authSecret: my-secret
  exposeAdminConsole: true
  adminConsoleServices:
    - data
  exposedFeatures:
    - xdcr
  tls:
    static:
      member:
        serverSecret: serverTlsSecret
      operatorSecret: operatorTlsSecret
  softwareUpdateNotifications: false
  serverGroups:
   - group1
   - group2
  disableBucketManagement: false
  cluster:
    dataServiceMemoryQuota: 256
    indexServiceMemoryQuota: 256
    searchServiceMemoryQuota: 256
    eventingServiceMemoryQuota: 256
    analyticsServiceMemoryQuota: 1024
    indexStorageSetting: default
    autoFailoverTimeout: 120
    autoFailoverMaxCount: 3
    autoFailoverOnDataDiskIssues: true
    autoFailoverOnDataDiskIssuesTimePeriod: 120
    autoFailoverServerGroup: false
  buckets:
    - name: default
      type: couchbase
      memoryQuota: 1024
      replicas: 1
      ioPriority: high
      evictionPolicy: value-eviction
      conflictResolution: seqno
      enableFlush: true
      enableIndexReplica: false
  servers:
  - size: 1
    name: all_services
    services:
      - kv
      - index
      - query
      - search
      - eventing
      - analytics
    serverGroups:
     - group1
     - group2
    pod:
      volumeMounts:
        default: couchbase
        data:  couchbase
        index: couchbase
        analytics:
         - couchbase
         - couchbase
      couchabseEnv:
        ENV1: value
      resources:
        limits:
          cpu: 4
          memory: 8GiB
          storage: 100GiB
        requests:
          cpu: 2
          memory: 8GiB
          storage: 50GiB
      labels:
        couchbase_services: all
      nodeSelector:
        instanceType: large
      tolerations:
        - key: app
          operator: Equal
          value: cbapp
          effect: NoSchedule
          tolerationSeconds: 5
      automountServiceAccountToken: false
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        storageClassName: "standard"
        resources:
          requests:
            storage: 1Gi
