# This configuration sets the exposeAdminConsole parameter to true
apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.0.1
  authSecret: cb-example-auth
  exposeAdminConsole: true
  cluster:
    indexStorageSetting: plasma
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
