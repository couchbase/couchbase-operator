# This configuration sets the adminConsoleServices to data, index, query, search
# and invalid
apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.0.1
  authSecret: cb-example-auth
  adminConsoleServices:
    - data
    - index
    - query
    - search
    - search
  cluster:
    indexStorageSetting: plasma
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
