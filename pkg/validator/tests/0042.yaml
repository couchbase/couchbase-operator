# Used to test updates to bucket conflict resolution fail
apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.0.1
  authSecret: cb-example-auth
  cluster:
    indexStorageSetting: plasma
  buckets:
    - name: default
      type: ephemeral
      memoryQuota: 256
      replicas: 3
      ioPriority: low
      evictionPolicy: valueOnly
      conflictResolution: lww
      enableFlush: false
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
