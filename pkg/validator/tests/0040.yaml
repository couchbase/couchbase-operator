# Used to check an update to the authSecret doesn't work
apiVersion: couchbase.database.couchbase.com/v1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.5.0
  authSecret: cb-example-auth-different
  cluster:
    indexStorageSetting: plasma
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
