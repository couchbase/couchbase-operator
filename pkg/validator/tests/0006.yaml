# This configuration sets paused to a non-boolean value
apiVersion: couchbase.database.couchbase.com/v1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  baseImage: couchbase/server
  version: enterprise-5.5.0
  paused: blah
  authSecret: cb-example-auth
  cluster:
    indexStorageSetting: plasma
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
