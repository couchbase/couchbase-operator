# A configuration to check the sum of all bucket quotas is less than the data service quota
apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.0.1
  authSecret: cb-example-auth
  cluster:
    dataServiceMemoryQuota: 256
    indexStorageSetting: memory_optimized
  buckets:
    - name: default
      type: couchbase
      memoryQuota: 512
      replicas: 3
      ioPriority: low
      evictionPolicy: valueOnly
      conflictResolution: seqno
      enableFlush: false
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - query
        - search
