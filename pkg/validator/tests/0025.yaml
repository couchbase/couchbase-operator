# The minimum base configuration
apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.0.1
  authSecret: cb-example-auth
  cluster:
    indexStorageSetting: plasma
  buckets:
    - name: bucket
      type: invalidtype
      memoryQuota: 256
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
