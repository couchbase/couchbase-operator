# This configuration sets a value for the baseImage.
apiVersion: couchbase.com/v1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  baseImage: internal/cbserver
  version: enterprise-5.5.0
  authSecret: cb-example-auth
  cluster:
    indexStorageSetting: plasma
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
