# The basic couchbase bucket creation
apiVersion: couchbase.com/v1
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  version: enterprise-5.5.0
  authSecret: cb-example-auth
  cluster:
    indexStorageSetting: plasma
  buckets:
    - name: default
      type: couchbase
      memoryQuota: 256
      replicas: -1
      ioPriority: high
      evictionPolicy: valueOnly
      conflictResolution: seqno
      enableFlush: false
      enableIndexReplica: true
  servers:
    - size: 3
      name: all_services
      services:
        - data
        - index
        - query
        - search
