# Default values for test-resources.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""
enableServiceTest: true

# service account for rbac
rbac:
  create: true
  clusterRoleAccess: true
  serviceAccountName:

tls:
  # name of secret with tls info to create
  secretName:
  # importTLS provides custom certificate and key files
  importTLS: false

couchbase-operator:
  couchbaseOperator:
    image:
      repository: couchbase/couchbase-operator-internal
    imagePullPolicy: Always
    imagePullSecrets:
    - regcred
  admissionController:
    image:
      repository: couchbase/couchbase-admission-internal
    imagePullPolicy: Always

# place holder for overrides to cluster
couchbase-cluster:
  couchbaseCluster:
    # setting name for the sake of dns testing and verifying services
    name: ci-testcluster
