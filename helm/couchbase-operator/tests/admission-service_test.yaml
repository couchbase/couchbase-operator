suite: test chart Service of admission controller
templates:
  - admission-service.yaml
tests:
  - it: should create Service
    asserts:
      - hasDocuments:
          count: 1
  - it: should not create Service when create is false
    set:
      admissionService:
        create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not create Service when controller is not created
    set:
      deployments:
        admissionController: false
      admissionService:
        create: true
    asserts:
      - hasDocuments:
          count: 0
  - it: should have same name as controller
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-couchbase-admission-controller
  - it: should set name to override value
    set:
      admissionController:
        name: different-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-different-name
  - it: should override controller name with service name 
    set:
      admissionController:
        name: different-name
      admissionService:
        name: better-name 
    asserts:
      - equal:
          path: metadata.name
          value: better-name
  - it: should use controller name for selector
    asserts:
      - equal:
          path: spec.selector.app
          value: couchbase-admission-controller
  - it: should set selector to override value
    set:
      admissionController:
        name: different-name
    asserts:
      - equal:
          path: spec.selector.app
          value: different-name
