suite: test webooks of admission-controller chart
templates:
  - admission-webhooks.yaml
tests:
  - it: should create a secret
    asserts:
      - isKind:
          of: Secret
  - it: should name secret the same as chart
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-couchbase-admission-controller
        documentIndex: 0
  - it: should set name of secret to override
    set:
      admissionController:
        name: different-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-different-name
        documentIndex: 0
  - it: should create a validating webhook
    asserts:
      - isKind:
          of: ValidatingWebhookConfiguration
        documentIndex: 1
  - it: should name validating webhook the same as chart
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-couchbase-admission-controller
        documentIndex: 1
  - it: should set name of validating webhook to override
    set:
      admissionController:
        name: different-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-different-name
        documentIndex: 1
  - it: should use dns with same name as service
    asserts:
      - matchRegex:
          path: webhooks[0].name
          pattern: "couchbase-admission-controller.NAMESPACE.svc$"
        documentIndex: 1
  - it: should set dns to custom service
    set:
      admissionService:
        name: different-service
    asserts:
      - equal:
          path: webhooks[0].name
          value: different-service.NAMESPACE.svc
        documentIndex: 1
  - it: should create a mutating webhook
    asserts:
      - isKind:
          of: MutatingWebhookConfiguration
        documentIndex: 2
  - it: should name  mutating webhook the same as chart
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-couchbase-admission-controller
        documentIndex: 2
  - it: should set name of mutating webhook to override
    set:
      admissionController:
        name: different-name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-different-name
        documentIndex: 2
  - it: should use dns with same name as service
    asserts:
      - matchRegex:
          path: webhooks[0].name
          pattern: "couchbase-admission-controller.NAMESPACE.svc$"
        documentIndex: 2
  - it: should set dns to custom service
    set:
      admissionService:
        name: different-service
    asserts:
      - equal:
          path: webhooks[0].name
          value: different-service.NAMESPACE.svc
        documentIndex: 2
