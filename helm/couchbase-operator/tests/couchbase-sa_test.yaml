suite: test chart ServiceAccount of couchbase operator
templates:
  - couchbase-service-account.yaml
tests:
  - it: should create ServiceAccount
    asserts:
      - hasDocuments:
          count: 1
  - it: should use name of chart for Service Account
    template: couchbase-service-accounts.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-couchbase-operator
  - it: should set SA name to value override
    template: couchbase-service-accounts.yaml
    set:
      couchbaseOperator:
        name: smooth-operator
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-smooth-operator
  - it: should set app label to operator name
    set:
      couchbaseOperator:
        name: different-name
    asserts:
      - equal:
          path: metadata.labels.app
          value: different-name
