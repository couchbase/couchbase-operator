suite: test rbac of couchbase-operator chart
templates:
  - couchbase-cluster-role-binding.yaml
  - couchbase-cluster-role.yaml
tests:
  - it: should grant ClusterRole 
    asserts:
      - isKind:
          of: ClusterRole
        template: couchbase-cluster-role.yaml
  - it: should grant Role 
    set:
      rbac:
        clusterRoleAccess: false
    asserts:
      - isKind:
          of: Role
        template: couchbase-cluster-role.yaml
  - it: should grant ClusterRoleBinding 
    asserts:
      - isKind:
          of: ClusterRoleBinding
  - it: should grant RoleBinding 
    set:
      rbac:
        clusterRoleAccess: false
    asserts:
      - isKind:
          of: RoleBinding
  - it: should bind to default ServiceAccount 
    asserts:
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-couchbase-operator
  - it: should bind to custom ServiceAccount 
    set:
      rbac:
        couchbaseServiceAccountName: different-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: different-sa
  - it: should reference ClusterRole kind
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
  - it: should refer to Role kind
    set:
      rbac:
        clusterRoleAccess: false
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
  - it: should refer to name 
    set:
      couchbaseOperator:
        name: smooth-operator
    asserts:
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-smooth-operator
