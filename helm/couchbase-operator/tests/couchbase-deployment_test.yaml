suite: test couchbase-operator deployment
templates:
  - couchbase-deployment.yaml
tests:
  - it: should be a Deployment
    asserts:
      - isKind:
          of: Deployment
  - it: should set Deployment name
    set:
      couchbaseOperator:
        name: smooth-operator
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-smooth-operator
  - it: should set labels to operator name
    set:
      couchbaseOperator:
        name: different-name
    asserts:
      - equal:
          path: metadata.labels.app
          value: different-name
      - equal:
          path: spec.selector.matchLabels.app
          value: different-name
      - equal:
          path: spec.template.metadata.labels.app
          value: different-name
  - it: should have default service account name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-couchbase-operator
  - it: should have same service account name as operator name
    set:
      couchbaseOperator:
        name: different-name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-different-name
  - it: should override service account name even when name if name override
    set:
      couchbaseOperator:
        name: different-name
      rbac:
        couchbaseServiceAccountName: different-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: different-sa
  - it: should not create service account when rbac is false
    set:
      rbac:
        create: false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
  - it: should have default image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "couchbase/operator:\\d+?.\\d+?.\\d+?"
  - it: should set image repository and tag
    set:
      couchbaseOperator:
        image:
          repository: myrepo/operator
          tag: 9.11.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "myrepo/operator:9.11.0"
  - it: should set pullPolicy to 'Always'
    set:
      couchbaseOperator:
        imagePullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
  - it: should not have default pull secrets
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
  - it: should set custom pull secrets
    set:
      couchbaseOperator:
        imagePullSecrets:
          - topsecret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: topsecret
  - it: should have command args to create-crd
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[1]
          value: "--create-crd=true"
  - it: should remove command args
    set:
      couchbaseOperator:
        commandArgs: null
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - couchbase-operator
  - it: should set readiness values
    set:
      couchbaseOperator:
        readinessProbe:
          initialDelaySeconds: 100
          periodSeconds: 100
          failureThreshold: 100
    asserts:
      - equal:
          path: spec.template.spec.containers[0].initialDelaySeconds
          value: 100
      - equal:
          path: spec.template.spec.containers[0].periodSeconds
          value: 100
      - equal:
          path: spec.template.spec.containers[0].failureThreshold
          value: 100
  - it: should set tolerations
    set:
      couchbaseOperator:
        nodeSelector:
          zone: us-east1-a
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
              zone: us-east1-a
  - it: should set node selectors
    set:
      couchbaseOperator:
        tolerations:
          - key: "key"
            operator: "Exists"
            effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0]
          value:
            key: "key"
            operator: "Exists"
            effect: "NoSchedule"
