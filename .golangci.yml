run:
  # Assume the build boxes are going to be miniscule
  deadline: 5m
  skip-dirs:
    - pkg/generated

linters:
  enable:
    - stylecheck
    - interfacer
    - unconvert
    - misspell

issues:
  exclude-rules:
  # Object reciever names clash with those that are autogenerated by Kubernetes
  # thus throwing these false positive errors.  The linter claims to detect auto-
  # generated code, but not in this instance.
  - linters:
    - stylecheck
    text:  ST1016
