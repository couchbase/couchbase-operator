# ===================================
# === Primary Indexes for bucket0 ===
# ===================================
apiVersion: batch/v1
kind: Job
metadata:
  name: cbq-bucket0
spec:
  template:
    metadata:
      name: cbq
    spec:
      containers:
        - name: cbq
          image: docker.io/sequoiatools/cbq
          command: ["/bin/bash", "-c", "--"]
          args: ["./shell/cbq/cbq -e=http://cb-example-0006.cb-example.default.svc:8093 -u=Administrator -p=password -script='CREATE PRIMARY INDEX primary_idx_bucket0_1 ON `bucket0`.`_default`.`_default` WITH { \"num_replica\": 1 };';
          ./shell/cbq/cbq -e=http://cb-example-0006.cb-example.default.svc:8093 -u=Administrator -p=password -script='CREATE PRIMARY INDEX primary_idx_bucket0_2 ON `bucket0`.`_default`.`_default` WITH { \"num_replica\": 1 };';
          ./shell/cbq/cbq -e=http://cb-example-0006.cb-example.default.svc:8093 -u=Administrator -p=password -script='CREATE PRIMARY INDEX primary_idx_bucket0_3 ON `bucket0`.`_default`.`_default` WITH { \"num_replica\": 1 };';
          ./shell/cbq/cbq -e=http://cb-example-0006.cb-example.default.svc:8093 -u=Administrator -p=password -script='CREATE PRIMARY INDEX primary_idx_bucket0_4 ON `bucket0`.`_default`.`_default` WITH { \"num_replica\": 1 };';
          ./shell/cbq/cbq -e=http://cb-example-0006.cb-example.default.svc:8093 -u=Administrator -p=password -script='CREATE PRIMARY INDEX primary_idx_bucket0_5 ON `bucket0`.`_default`.`_default` WITH { \"num_replica\": 1 };';"]
      restartPolicy: Never
#      tolerations:
#        - key: "workload-node"
#          operator: "Equal"
#          value: "true"
#          effect: "NoSchedule"
      nodeSelector:
        workload-node: "true"
---

