# ===========================
# ======= Description =======
# ===========================
# Gideon Job for continuous data loading on default collection
# Definition: 2000 ops, 100% create, 50% get, 98% deletes
# node-selector is the for the label: couchbase-node=true

apiVersion: batch/v1
kind: Job
metadata:
  name: gideon-bucket0
spec:
  template:
    metadata:
      name: gideon_latest
    spec:
      containers:
        - name: gideon-latest
          image: docker.io/sequoiatools/gideon_latest
          args: ["kv", "--bucket", "bucket0", "--user", "Administrator", "--password", "password", "--ops", "2000", "--create", "100", "--get", "50", "--expire", "20", "--ttl", "10", "--delete", "98", "--hosts", "cb-example-0005.cb-example.default.svc", "--sizes", "1024"]
      restartPolicy: Never
#      tolerations:
#        - key: "workload-node"
#          operator: "Equal"
#          value: "true"
#          effect: "NoSchedule"
      nodeSelector:
        workload-node: "true"
---
