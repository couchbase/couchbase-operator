# Gideon Job for continuous data loading on default collection
# Definition: 2000 ops, 100% create, 0% get

apiVersion: batch/v1
kind: Job
metadata:
  name: gideon-bucket0
spec:
  template:
    metadata:
      name: gideon_latest
    spec:
      containers:
        - name: gideon-latest
          image: docker.io/sequoiatools/gideon_latest
          args: ["kv", "--ops", "2000", "--create", "100", "--get", "0", "--sizes", "2048", "--expire", "20", "--ttl", "15", "--hosts", "cb-example-0000.cb-example.default.svc", "--user", "Administrator", "--password", "password", "--bucket", "bucket0"]
      restartPolicy: Never