apiVersion: batch/v1
kind: Job
metadata:
  name: log-collection
spec:
  template:
    spec:
      containers:
        - name: curl-container
          image: curlimages/curl:latest  # Using curl container image
          command: ["curl"]
          args:
            - "-X"
            - "POST"
            - "http://cb-example-0010.cb-example.default.svc:8091/controller/startLogsCollection"
            - "-u"
            - "Administrator:password"
            - "-d"
            - "nodes=*"
            - "-d"
            - "logRedactionLevel=none"
            - "-d"
            - "uploadHost=https://cb-engineering.s3.amazonaws.com"
            - "-d"
            - "customer=2024-06-30A_k8s1.28_cb7.6.1_post_swap_rebalance"
      restartPolicy: Never
      tolerations:
        - key: "workload-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      nodeSelector:
        workload-node: "true"