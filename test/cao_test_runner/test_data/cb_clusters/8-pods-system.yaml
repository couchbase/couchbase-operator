# ====================================
# ======== Cluster Definition ========
# ====================================
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  antiAffinity: true
#  autoResourceAllocation:
#    cpuLimits: "15"
#    cpuRequests: "15"
#    enabled: true
#    overheadPercent: 0
  image: couchbase/server:7.2.6
  upgradeProcess: InPlaceUpgrade
  security:
    adminSecret: cb-example-auth
  buckets:
    managed: true
  cluster:
    autoFailoverTimeout: 5s
    autoFailoverMaxCount: 1
    dataServiceMemoryQuota: 58Gi
    indexServiceMemoryQuota: 58Gi
    analyticsServiceMemoryQuota: 2Gi
    eventingServiceMemoryQuota: 512Mi
    searchServiceMemoryQuota: 512Mi
    indexer:
      storageMode: plasma
  serverGroups:
    - us-east-2a
    - us-east-2b
    - us-east-2c
  servers:
    - size: 4
      name: data-only
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - data
      volumeMounts:
        default: couchbase-default
        data: couchbase-data
    - size: 2
      name: index-query
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - index
        - query
      volumeMounts:
        default: couchbase-default
        index: couchbase-index
    - name: all-services
      size: 1
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - data
        - analytics
        - eventing
        - search
      volumeMounts:
        default: couchbase-default
        data: couchbase-data
        analytics:
          - couchbase-default
    - name: all-services-new
      size: 1
      serverGroups:
        - us-east-2b
        - us-east-2c
      services:
        - index
        - query
        - analytics
        - eventing
        - search
      volumeMounts:
        default: couchbase-default
        index: couchbase-index
        analytics:
          - couchbase-default
  securityContext:
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase-default
      spec:
        resources:
          requests:
            storage: 100Gi
    - metadata:
        name: couchbase-data
      spec:
        resources:
          requests:
            storage: 800Gi
    - metadata:
        name: couchbase-index
      spec:
        resources:
          requests:
            storage: 800Gi