# ====================================
# ========== Cluster Secret ==========
# ====================================
apiVersion: v1
kind: Secret
metadata:
  name: cb-example-auth
type: Opaque
data:
  username: QWRtaW5pc3RyYXRvcg== # Administrator
  password: cGFzc3dvcmQ=         # password
---

# ====================================
# ======== Cluster Definition ========
# ====================================
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  antiAffinity: true
  image: couchbase/server:7.6.1
  upgradeProcess: SwapRebalance
  security:
    adminSecret: cb-example-auth
  buckets:
    managed: true
  cluster:
    autoFailoverTimeout: 5s
    dataServiceMemoryQuota: 60Gi
    indexServiceMemoryQuota: 50Gi
    indexer:
      storageMode: plasma
  serverGroups:
    - us-east-2a
    - us-east-2b
    - us-east-2c
  servers:
    - size: 6
      name: data-only
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - data
      volumeMounts:
        default: couchbase
        data: couchbase
      pod:
        spec:
          nodeSelector:
            couchbase-node: "true"
    - size: 4
      name: index-query
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - index
        - query
      volumeMounts:
        default: couchbase
        index: couchbase
      pod:
        spec:
          nodeSelector:
            couchbase-node: "true"
  securityContext:
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        resources:
          requests:
            storage: 800Gi