apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  antiAffinity: true
  image: couchbase/server:7.6.0
  upgradeProcess: SwapRebalance
  security:
    adminSecret: cb-example-auth
  buckets:
    managed: true
  cluster:
    autoFailoverTimeout: 5s
    dataServiceMemoryQuota: 60Gi
    indexServiceMemoryQuota: 50Gi
    indexer:
      storageMode: plasma
      enableShardAffinity: true
  serverGroups:
    - us-east-2a
    - us-east-2b
    - us-east-2c
  servers:
    - size: 6
      name: data-only
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - data
      volumeMounts:
        default: couchbase-low
        data: couchbase
      pod:
        spec:
          nodeSelector:
            couchbase-node: "true"
    - size: 4
      name: index-query
      serverGroups:
        - us-east-2a
        - us-east-2b
        - us-east-2c
      services:
        - index
        - query
      volumeMounts:
        default: couchbase-low
        index: couchbase-idx
      pod:
        spec:
          nodeSelector:
            couchbase-node: "true"
  securityContext:
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        resources:
          requests:
            storage: 800Gi
    - metadata:
        name: couchbase-low
      spec:
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: couchbase-idx
      spec:
        resources:
          requests:
            storage: 200Gi