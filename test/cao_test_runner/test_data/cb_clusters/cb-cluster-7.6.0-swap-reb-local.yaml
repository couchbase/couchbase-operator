apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  antiAffinity: true
  image: couchbase/server:7.6.0
  upgradeProcess: SwapRebalance
  security:
    adminSecret: cb-example-auth
  buckets:
    managed: true
  cluster:
    autoFailoverTimeout: 5s
    dataServiceMemoryQuota: 4Gi
    indexServiceMemoryQuota: 2Gi
    indexer:
      storageMode: plasma
      enableShardAffinity: true
  servers:
    - size: 6
      name: data-only
      services:
        - data
    - size: 4
      name: index-query
      services:
        - index
        - query