apiVersion: v1
kind: Secret
metadata:
  name: cb-example-auth
type: Opaque
data:
  username: QWRtaW5pc3RyYXRvcg== # Administrator
  password: cGFzc3dvcmQ=         # password
---
# ====================================
# ======== Bucket Definitions ========
# ====================================
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket0
spec:
  memoryQuota: 100Mi
  enableIndexReplica: true
  evictionPolicy: fullEviction
---
# ====================================
# ======== Cluster Definition ========
# ====================================
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  image: couchbase/server:7.2.5
  upgradeProcess: DeltaRecovery
  security:
    adminSecret: cb-example-auth
  buckets:
    managed: true
  cluster:
    autoFailoverTimeout: 5s
    dataServiceMemoryQuota: 500Mi
  servers:
    - size: 3
      name: data-only
      services:
        - data
      volumeMounts:
        default: couchbase
  securityContext:
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        resources:
          requests:
            storage:  2Gi