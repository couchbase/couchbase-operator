action: "Deploy Couchbase"
config:
  cbClusterSpecPath: "./test_data/cb_clusters/3-data-7.2.5-delta-recovery.yaml"
  validators:
    - name: "preFlight"
      state: "PRE"
    - name: "couchbaseReadiness"
      state: "POST"
      durationInSecs: 300
      intervalInSecs: 10
    - name: "couchbaseVersion"
      state: "POST"
      cbVersion: "7.2.5"
trees:
    - action: "Generic Workload"
      config:
        name: "Data Workload"
        specPath: "./test_data/data_workloads/job-gideon-1-bucket.yaml"
        preRunWait: 1
        postRunWait: 0
        runDuration: 3
      trees:
        - action: "Delta Upgrade"
          config:
            specPath: "./test_data/cb_clusters/3-data-7.6.1-delta-recovery.yaml"
            validators:
              - name: "couchbaseVersion"
                state: "POST"
                cbVersion: "7.6.1"
              - name: "couchbaseReadiness"
                state: "POST"
                durationInSecs: 600
                intervalInSecs: 10