action: "Deploy Couchbase"
config:
  cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.2.5-simple-local.yaml"
  cbBucketsSpecPath: ""
  cbSecretsSpecPath: ""
  validators:
    preFlight:
      state: "PRE"
#    labelTaintNodes:
#      state: "PRE"
#      numCBNodes: 6
#      numWorkloadNodes: 2
    couchbaseReadiness:
      state: "POST"
    couchbaseVersion:
      state: "POST"
      cbVersion: "7.2.5"
trees:
  - action: "Generic Workload"
    config:
      name: "Data Workload"
      specPath: "./test_data/data_workload_spec/gideon.yaml"
      preRunWait: 1
      postRunWait: 1
      runDuration: 3
    trees:
      - action: "Delta Upgrade"
        config:
          specPath: "./test_data/cb_clusters/cb-cluster-7.2.5-simple-local-upgrade-7.6.1.yaml"
          validators:
            couchbaseVersion:
              state: "POST"
              cbVersion: "7.6.1"
            couchbaseReadiness:
              state: "POST"