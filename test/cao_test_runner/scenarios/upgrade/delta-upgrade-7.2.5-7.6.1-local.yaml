action: "Deploy Couchbase"
config:
  cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.2.5-simple-local.yaml"
  cbBucketsSpecPath: ""
  cbSecretsSpecPath: ""
  validators:
    - name: "preFlight"
      state: "PRE"
#   - name : "labelTaintNodes"
#     state: "PRE"
#     numCBNodes: 6
#     numWorkloadNodes: 2
    - name: "couchbaseReadiness"
      state: "POST"
    - name: "couchbaseVersion"
      state: "POST"
      cbVersion: "7.2.5"
trees:
  - action: "Generic Workload"
    config:
      name: "Data Workload"
      specPath: "./test_data/data_workload_spec/gideon.yaml"
      preRunWait: 1
      postRunWait: 1
      runDuration: 3
    trees:
      - action: "Delta Upgrade"
        config:
          specPath: "./test_data/cb_clusters/cb-cluster-7.2.5-simple-local-upgrade-7.6.1.yaml"
          validators:
            - name: "couchbaseVersion"
              state: "POST"
              cbVersion: "7.6.1"
            - name: "couchbaseReadiness"
              state: "POST"