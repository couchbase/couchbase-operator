# This yaml requires following fields to be set in env / context
# CLUSTER_NAME / ClusterName
# OPERATOR_IMAGE / OperatorImage
# ADMISSION_CONTROLLER_IMAGE / AdmissionControllerImage
# OPERATOR_VERSION / OperatorVersion
# OPERATING_SYSTEM / OperatingSystem
# ARCHITECTURE / Architecture
# AKS_REGION / AKSRegion
# KUBECONFIG / KubeConfigPath

# This yaml optionally requires the following fields to be set in env
# IMAGE_REGISTRY_SERVER
# IMAGE_REGISTRY_USERNAME
# IMAGE_REGISTRY_PASSWORD
# IMAGE_REGISTRY_EMAIL

# This yaml may also require the following env to be set
# AKS_REGION
# AKS_SUBSCRIPTION_ID
# AKS_SERVICE_PRINCIPAL_ID
# AKS_SERVICE_PRINCIPAL_SECRET_ID
# AKS_TENANT_ID

action: "Setup Kubernetes Cluster"
config:
  description:
    - "setup kubernetes cluster on cloud environment on Azure (AKS cluster)"
  platform: kubernetes
  environment: cloud
  provider: azure
  kubernetesVersion: 1.28.0
  vmSize: Standard_B2ms
  count: 7
  diskSize: 100
  osType: Linux
  osSKU: AzureLinux
  numNodePools: 1
trees:
  - action: "Setup CAO Binary and Deploy CRDs"
    config:
      description:
        - "setup cao binary and deploying crds for AKS cluster"
    trees:
      - action: "Setup Operator"
        config:
          description:
            - "setup operator in AKS cluster"
        trees:
          - action: "Setup Admission Controller"
            config:
              description:
                - "setup admission controller in AKS cluster"
              validateSecrets: true
              validateStorageClasses: true
