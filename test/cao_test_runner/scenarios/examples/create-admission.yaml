action: "Setup Admission Controller"
config:
  admissionControllerImage: couchbase/couchbase-admission-controller:2.7.0-arm64
  caoBinaryPath: "./couchbase-operator/build/bin/kubernetes-darwin-arm64/cao"
  cpuLimit: 1
  cpuRequest: 500
  imagePullPolicy: IfNotPresent
  imagePullSecret: "abc"
  admissionControllerLogLevel: 1
  memoryLimit: 400
  memoryRequest: 200
  replicas: 1
  validateSecrets: true
  validateStorageClasses: true
  scope: cluster