trees:
  - action: "Index Workload"
    config:
      name: "CBQ Workload"
      namespace: default
      cbClusterSecret: cb-example-auth
      runDuration: 2m0s
      checkJobCompletion: true
#      nodeSelector:
#        workload-node: "true"
      indexWorkloadName: cbq
      numQueryPods: 2
      numIndexPods: 2
      bucketCount: 2 # If `buckets` is not given then buckets (= bucket1, bucket2...) with default scope and collection will be taken
      #      buckets:
      #        - bucket: bucket-name1
      #          scopes:
      #            - scope: scope1
      #              collections:
      #                - collection1
      #            - scope: scope2
      #              collections:
      #                - collection2
      indexConfig:
        numIndexes: 3 # This is per Bucket per Scope per Collection. Make sure this is less than the number of indexes in stored queries slice.
        numReplicas: 1 # Make sure this is less than the number of index pods in the cluster
        numPartitions: 1 # Make sure this is less than the number of index pods in the cluster
        templateName: gideon
        indexSelectionStrategy: random
#        indexSelectionStrategy: range
#        indices: [3, 6] # This is a range [3, 6) and it refers to the range of indices of the stored queries slice.
#        indexSelectionStrategy: selective
#        indices: [0, 5, 19] # Refers to the indices of the stored queries slice.
