trees:
  - action: "Data Workload"
    config:
      name: "Gideon Workload"
      preRunWait: 30s
      postRunWait: 30s
      runDuration: 1m
      cbPodFilter:
        filterType: services
        selectionStrategy: latest
        services:
          - data
        servicesNotStrict: True
        count: 1
      nodeSelector:
        workload-node: "true"
      checkJobCompletion: False # Default is False. TODO
      dataWorkloadName: gideon
      opsRate: 1000
      docSize: 1024 # Default 1024
      bucketCount: 5 # If `buckets` is not given then buckets (= bucket1, bucket2...) with default scope and collection will be taken
#      buckets:
#        - bucket: bucket-name1
#          scopes:
#            - scope: scope1
#              collections:
#                - collection1
#            - scope: scope2
#              collections:
#                - collection2
      creates: 50
      reads: 20
      updates: 0
      deletes: 0
      expires: 0
      ttl: 0