trees:
  - action: "Query Workload"
    config:
      name: "QueryApp Workload"
      namespace: default
      cbClusterSecret: cb-example-auth
      runDuration: 30s
      preRunWait: 0s
      postRunWait: 0s
      checkJobCompletion: false
#      nodeSelector:
#        workload-node: "true"
      queryWorkloadName: queryApp
      numQueryPods: 2
      bucketCount: 2 # If `buckets` is not given then buckets (= bucket1, bucket2...) with default scope and collection will be taken
      #      buckets:
      #        - bucket: bucket-name1
      #          scopes:
      #            - scope: scope1
      #              collections:
      #                - collection1
      #            - scope: scope2
      #              collections:
      #                - collection2
      queryConfig:
        numQueries: 2
        queryDuration: 0
        threads: 2
        queryFile: queries.txt
        analyticsQueries: false
        queryTimeout: 600
        scanConsistency: REQUEST_PLUS
        dataset: hotel
        printDuration: 10