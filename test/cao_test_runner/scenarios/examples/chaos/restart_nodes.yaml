trees:
  - action: "Chaos"
    config:
      description:
        - Restart a k8s node which has cb pod with data service.
        - Then check for rebalance and again restart node.
      platform: kubernetes
      environment: cloud
      provider: aws
      clusterName: k8s-cluster-name
      chaosList:
        - chaosActions:
            - RestartNodes
          cbPodFilter:
            filterType: serverNames
            selectionStrategy: sorted
            serverNames:
              - "data-only"
            count: 1
          triggerConfig:
            - triggerName: wait
              triggerDuration: 10s
              cbSecret: cb-example-auth
#          cbUpgradeVersion: 7.6.3
        - chaosActions:
            - RestartNodes
          cbPodFilter:
            filterType: serverNames
            selectionStrategy: sorted
            serverNames:
              - "data-only"
            count: 1
          triggerConfig:
            - triggerName: deltaRecoveryRebalance
              triggerDuration: 3m0s
              triggerInterval: 5s
              postTriggerWait: 20s
              cbSecret: cb-example-auth