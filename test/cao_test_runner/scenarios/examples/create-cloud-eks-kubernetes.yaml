action: "Setup Kubernetes Cluster"
config:
  clusterName: testing
  platform: kubernetes
  environment: cloud
  provider: aws
  eksRegion: us-east-2
  kubernetesVersion: 1.27
  instanceType: m5.xlarge
  numNodeGroups: 1
  minSize: 10
  maxSize: 12
  desiredSize: 11
  diskSize: 100
  ami: AL2_x86_64
  operatorImage: couchbase/couchbase-admission-controller:2.7.0-arm64
  admissionControllerImage: couchbase/couchbase-operator:2.7.0-arm64