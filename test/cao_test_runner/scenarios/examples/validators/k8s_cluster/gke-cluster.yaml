# This validator must be used with "Setup Kubernetes Cluster" and "Upgrade Kubernetes Cluster" actions.
validators:
  - name: "KubernetesClusterValidator"
    clusterName: "gke-cluster"
    state: "POST"
    gkeConfig:
      kubernetesVersion: 1.31.6
      releaseChannel: "REGULAR"
      gkeNodePoolConfig:
        "gke-cluster-np-0":
          kubernetesVersion: 1.31.6
          numNodesPerZone: 1
          machineType: n1-standard-2
          imageType: ubuntu_containerd
          diskType: pd-standard
          diskSize: 50
        "gke-cluster-np-1":
          kubernetesVersion: 1.31.6
          numNodesPerZone: 1
          machineType: n1-standard-4
          imageType: ubuntu_containerd
          diskType: pd-standard
          diskSize: 50