nodeFilter:
  managedSvcName: eks # kind | eks | aks | gke
  count: 1
  selectStrategy: any # any | roundRobinAZ
  sortByStrategy: default # default | sorted | random | oldest | latest
  azList:
    - us-east-2a
    - us-east-2b
  skipOperator: true
  skipAdmission: true
  avoidLabels:
    -
      - label1_key
      - label1_value1
    -
      - label1_key
      - label1_value2
    -
      - label2_key
      - label2_value