action: "Upgrade Kubernetes Cluster"
config:
  clusterName: aks-cluster
  aksRegion: eastus2
  kubernetesVersion: 1.32.0
  upgradeClusterVersion: true
  waitForClusterUpgrade: true
  upgradeAKSNodePools: true
  aksNodePoolsToUpgrade:
    - nodePoolName: systempool0
      waitForNodePoolUpgrade: true
    - nodePoolName: nodepool0
      waitForNodePoolUpgrade: true