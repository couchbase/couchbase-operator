action: "Setup Operator"
config:
  operatorImage: couchbase/couchbase-operator:2.7.0-arm64
  caoBinaryPath: "./couchbase-operator/build/bin/kubernetes-darwin-arm64/cao"
  cpuLimit: 1
  cpuRequest: 500
  imagePullPolicy: IfNotPresent
  imagePullSecret: "abc"
  operatorLogLevel: 1
  memoryLimit: 400
  memoryRequest: 200
  podCreationTimeout: 10m1s
  podDeleteDelay: 0s
  podReadinessDelay: 15s
  podReadinessPeriod: 25s
  scope: namespace