action: "Deploy Couchbase"
config:
  description:
    - "Deploy Couchbase Cluster with 3 KV and 3 Index-Query"
  cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.6.0-swap-rebalance.yaml"
  cbBucketsSpecPath: "./test_data/cb_buckets/5-buckets-1-replica.yaml"
  cbSecretsSpecPath: "./test_data/cb_secrets/default_cb_secrets.yaml"
  applyClusterSpecChanges:
    "/spec/servers/0/size": 3
    "/spec/servers/1/size": 3
  validators:
    - name: "preFlight"
      state: "PRE"
    - name: "couchbaseReadiness"
      state: "POST"
    - name: "couchbaseVersion"
      state: "POST"
      cbVersion: "7.6.0"
    - name: "collectLogs"
      state: "POST"
      logName: "k8s_log"
      cbServerLogs: false
      operatorLogs: false
trees:
  - action: "Generic Workload"
    config:
      name: "Indexes Creation"
      specPath: "./test_data/idx_query_workloads/job-cbq-20-primary-idx-5-buckets.yaml"
      preRunWait: 0
      postRunWait: 0
      runDuration: 2
    trees:
      - action: "Generic Workload"
        config:
          name: "Data Workload"
          specPath: "./test_data/data_workloads/job-gideon-5-buckets-max-load.yaml"
          preRunWait: 0
          postRunWait: 1
          runDuration: 3
        trees:
          - action: "Generic Workload"
            config:
              name: "Data Workload"
              specPath: "./test_data/data_workloads/job-gideon-5-buckets-cont.yaml"
              preRunWait: 0
              postRunWait: 0
              runDuration: 30
          - action: "Generic Workload"
            config:
              name: "Query Workload"
              specPath: "./test_data/idx_query_workloads/job-queryapp-5-buckets.yaml"
              preRunWait: 0
              postRunWait: 0
              runDuration: 30
          - action: "Deploy Couchbase"
            config:
              description:
                - Upgrade Couchbase Cluster to 7.6.1
                - Turned on Index File based Rebalance
              cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.6.0-swap-rebalance.yaml"
              applyClusterSpecChanges:
                "spec/image": couchbase/server:7.6.1
              validators:
                - name: "couchbaseVersion"
                  state: "POST"
                  cbVersion: "7.6.1"
                  durationInMinutes: 45
                  intervalInMinutes: 1
                - name: "couchbaseReadiness"
                  state: "POST"
                - name: "collectLogs"
                  state: "POST"
                  logName: "k8s_log"
                  cbServerLogs: false
                  operatorLogs: false