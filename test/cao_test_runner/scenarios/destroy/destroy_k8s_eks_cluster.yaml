# The following fields need to be set in env / context
# CAO_BINARY_PATH / CAOBinaryPath
# CRD_PATH / CRDPath
# CLUSTER_NAME / ClusterName
# PLATFORM / Platform
# ENVIRONMENT / Environment
# PROVIDER / Provider
# EKS_REGION / EKSRegion

# This yaml may also require the following env to be set
# EKS_REGION
# EKS_ACCESS_KEY
# EKS_SECRET_KEY
# EKS_ACCOUNT_ID

action: "Destroy Admission Controller"
config:
  description:
    - "destroy admission controller in EKS cluster"
trees:
  - action: "Destroy Operator"
    config:
        description:
          - "destroy operator in EKS cluster"
    trees:
      - action: "Delete CRDs"
        config:
          description:
            - "delete crds from EKS cluster"
        trees:
          - action: "Destroy Kubernetes Cluster"
            config:
              description:
                - "destroy the EKS cluster"
