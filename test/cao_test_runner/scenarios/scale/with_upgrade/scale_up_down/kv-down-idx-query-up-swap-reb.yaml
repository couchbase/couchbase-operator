action: "Deploy Couchbase"
config:
  description:
    - "Deploy Couchbase Cluster with 5 KV and 2 Index-Query"
  cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.2.5-delta-recovery.yaml"
  cbBucketsSpecPath: "./test_data/cb_buckets/5-buckets-1-replica.yaml"
  cbSecretsSpecPath: "./test_data/cb_secrets/default_cb_secrets.yaml"
  applyClusterSpecChanges:
    "/spec/servers/0/size": 5
    "/spec/servers/1/size": 2
    "/spec/upgradeProcess": SwapRebalance
  validators:
    - name: "preFlight"
      state: "PRE"
    - name: "couchbaseReadiness"
      state: "POST"
    - name: "couchbaseVersion"
      state: "POST"
      cbVersion: "7.2.5"
    - name: "collectLogs"
      state: "POST"
      logName: "k8s_log"
      cbServerLogs: false
      operatorLogs: false
trees:
  - action: "Generic Workload"
    config:
      name: "Indexes Creation"
      specPath: "./test_data/idx_query_workloads/job-cbq-20-primary-idx-5-buckets.yaml"
      preRunWait: 0
      postRunWait: 0
      runDuration: 2
    trees:
      - action: "Generic Workload"
        config:
          name: "Data Workload"
          specPath: "./test_data/data_workloads/job-gideon-5-buckets-max-load.yaml"
          preRunWait: 0
          postRunWait: 1
          runDuration: 2
        trees:
          - action: "Generic Workload"
            config:
              name: "Data Workload"
              specPath: "./test_data/data_workloads/job-gideon-5-buckets-cont.yaml"
              preRunWait: 0
              postRunWait: 0
              runDuration: 30
          - action: "Generic Workload"
            config:
              name: "Query Workload"
              specPath: "./test_data/idx_query_workloads/job-queryapp-5-buckets.yaml"
              preRunWait: 0
              postRunWait: 0
              runDuration: 30
          - action: "Deploy Couchbase"
            config:
              description:
                - "Scale Down KV 5->3 and Scale Up Index-Query 2->3"
                - "Apply Delta Recovery upgrade 7.2.5 -> 7.6.1"
              cbClusterSpecPath: "./test_data/cb_clusters/cb-cluster-7.2.5-delta-recovery.yaml"
              applyClusterSpecChanges:
                "/spec/servers/0/size": 3
                "/spec/servers/1/size": 3
                "/spec/image": couchbase/server:7.6.1
              validators:
                - name: "couchbaseClusterSize"
                  state: "POST"
                  durationInSecs: 3600 # 60 Minutes = 60 * 60 Seconds
                  intervalInSecs: 45
                  preRunWaitInSecs: 90
                  mapServerNameToSize:
                    "data-only": 3
                    "index-query": 3
                - name: "couchbaseVersion"
                  state: "POST"
                  cbVersion: "7.6.1"
                - name: "couchbaseReadiness"
                  state: "POST"
                - name: "collectLogs"
                  state: "POST"
                  logName: "k8s_log"
                  cbServerLogs: false
                  operatorLogs: false