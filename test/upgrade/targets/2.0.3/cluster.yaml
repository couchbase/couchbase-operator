apiVersion: v1
kind: Secret
metadata:
  name: cb-example-auth
type: Opaque
data:
  username: QWRtaW5pc3RyYXRvcg==
  password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: couchbase-operator-tls
type: Opaque
data:
  ca.crt: 
---
apiVersion: v1
kind: Secret
metadata:
  name: couchbase-server-tls
type: Opaque
data:
  chain.pem: 
  pkey.key: 
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: default
---
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cb-example
spec:
  image: couchbase/server:6.6.0
  security:
    adminSecret: cb-example-auth
  networking:
    tls:
      static:
        serverSecret: couchbase-server-tls
        operatorSecret: couchbase-operator-tls
  buckets:
    managed: true
  servers:
    - size: 3
      name: basic
      services:
        - data
        - index
        - query
      volumeMounts:
        default: default
  volumeClaimTemplates:
  - metadata:
      name: default
    spec:
      resources:
        requests:
          storage: 1Gi
