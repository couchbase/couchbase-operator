    rbac:
      managed: true
  buckets:
    managed: true
  xdcr:
    managed: true
    remoteClusters:
      - name: cluster1
        uuid: 246bb8fb53a75e37819cb50b98ac3b65
        hostname: couchbases://localhost
  servers:
