apiVersion: couchbase.com/v2
kind: CouchbaseReplication
metadata:
  name: replication0
spec:
  bucket: bucket1
  remoteBucket: bucket1
  conflictLogging:
    enabled: true
    logCollection:
      bucket: bucket2
      scope: scope1
      collection: collection1
    loggingRules:
      customCollectionRules:
        - logCollection:
            bucket: bucket2
            scope: scope1
            collection: collection1
          scope: scope2
          collection: collection2
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket1
spec:
  enableCrossClusterVersioning: true
