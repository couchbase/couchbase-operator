apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster
  annotations:
    cao.couchbase.com/buckets.enableBucketMigrationRoutines: "true"  
spec:
  image: couchbase/server:7.5.0
  security:
    adminSecret: cb-example-auth
    rbac:
      managed: true
  buckets:
    managed: true
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - query
        - search
        - eventing
        - analytics
  cluster:
    dataServiceMemoryQuota: 2048Mi  
status:
  currentVersion: 7.5.0
  size: 1
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket1
  annotations:
    cao.couchbase.com/historyRetention.collectionHistoryDefault: "false"  
spec:
  memoryQuota: 1024Mi
  evictionPolicy: fullEviction
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket2
  annotations:
    cao.couchbase.com/historyRetention.collectionHistoryDefault: "false"
spec:
  storageBackend: magma
  memoryQuota: 1024Mi
  evictionPolicy: fullEviction