apiVersion: v1
kind: Secret
metadata:
  name: xdcr-tls-secret
data:
  ca: YmxhaCBibGFoIGJsYWgK
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket0
spec:
  memoryQuota: 100Mi
  replicas: 0
  ioPriority: high
  evictionPolicy: fullEviction
  conflictResolution: seqno
  enableFlush: true
  enableIndexReplica: false
  compressionMode: passive
  minimumDurability: none
  maxTTL: 60s
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket1
spec:
  name: explicit-name
  memoryQuota: 100Mi
  replicas: 0
  ioPriority: high
  evictionPolicy: valueOnly
  conflictResolution: seqno
  enableFlush: true
  enableIndexReplica: false
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseMemcachedBucket
metadata:
  name: bucket2
spec:
  memoryQuota: 100Mi
  enableFlush: true
---
apiVersion: couchbase.com/v2
kind: CouchbaseEphemeralBucket
metadata:
  name: bucket3
spec:
  memoryQuota: 100Mi
  replicas: 3
  ioPriority: low
  evictionPolicy: noEviction
  conflictResolution: lww
  enableFlush: true
  compressionMode: passive
  minimumDurability: none
---
apiVersion: couchbase.com/v2
kind: CouchbaseEphemeralBucket
metadata:
  name: bucket4
spec:
  memoryQuota: 100Mi
  replicas: 3
  ioPriority: low
  evictionPolicy: nruEviction
  conflictResolution: lww
  enableFlush: true
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseReplication
metadata:
  name: replication0
spec:
  bucket: bucket0
  remoteBucket: bucket0
---
apiVersion: couchbase.com/v2
kind: CouchbaseReplication
metadata:
  name: replication1
spec:
  bucket: explicit-name # refers to explicit name, not implicit name
  remoteBucket: bucket0
---
