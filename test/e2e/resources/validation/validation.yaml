apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket0
spec:
  memoryQuota: 100
  replicas: 0
  ioPriority: high
  evictionPolicy: fullEviction
  conflictResolution: seqno
  enableFlush: true
  enableIndexReplica: false
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket1
spec:
  memoryQuota: 100
  replicas: 0
  ioPriority: high
  evictionPolicy: valueOnly
  conflictResolution: seqno
  enableFlush: true
  enableIndexReplica: false
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseMemcachedBucket
metadata:
  name: bucket2 
spec:
  memoryQuota: 100
  enableFlush: true
---
apiVersion: couchbase.com/v2
kind: CouchbaseEphemeralBucket
metadata:
  name: bucket3
spec:
  memoryQuota: 100
  replicas: 3
  ioPriority: low
  evictionPolicy: noEviction
  conflictResolution: lww
  enableFlush: true
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseEphemeralBucket
metadata:
  name: bucket4
spec:
  memoryQuota: 100
  replicas: 3
  ioPriority: low
  evictionPolicy: nruEviction
  conflictResolution: lww
  enableFlush: true
  compressionMode: passive
---
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster
  namespace: default
spec:
  antiAffinity: false
  image: couchbase/server:enterprise-5.5.0
  authSecret: basic-test-secret
  exposeAdminConsole: false
  paused: false
  disableBucketManagement: false
  logRetentionTime: "24h"
  logRetentionCount: 10
  adminConsoleServices:
      - data
      - index
      - query
      - search
  serverGroups:
    - RzaGroup-1
    - RzaGroup-2
    - RzaGroup-3
  dns:
    domain: "example.com"
  cluster:
    dataServiceMemoryQuota: 600
    indexServiceMemoryQuota: 256
    searchServiceMemoryQuota: 256
    eventingServiceMemoryQuota: 256
    analyticsServiceMemoryQuota: 1024
    indexStorageSetting: memory_optimized
    autoFailoverOnDataDiskIssuesTimePeriod: 10
    autoFailoverMaxCount: 1
    autoFailoverTimeout: 10
  buckets:
    managed: true
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - analytics
        - query
        - search
        - eventing
      pod:
        volumeMounts:
          default: couchbase
    - size: 1
      name: statefull_services
      services:
        - data
        - index
        - analytics
      pod:
        volumeMounts:
          default: couchbase
          data: couchbase
          index: couchbase
          analytics:
            - couchbase
            - couchbase
    - size: 1
      name: server_groups
      services:
        - data
        - index
        - query
      pod:
        volumeMounts:
          default: couchbase
      serverGroups:
        - RzaGroup-1
        - RzaGroup-2
    - size: 1
      name: stateless_services
      services:
        - query
        - search
        - eventing
      pod:
        volumeMounts:
          logs: couchbase-log-pv
    - size: 1
      name: data_only
      services:
        - data
      pod:
        volumeMounts:
          default: couchbase
  securityContext:
    runAsUser: 1000
    runAsNonRoot: false
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
          limits:
            storage: 2Gi
    - metadata:
        name: couchbase-log-pv
      spec:
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
          limits:
            storage: 2Gi
