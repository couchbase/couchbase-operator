apiVersion: couchbase.com/v1
kind: CouchbaseCluster
metadata:
  name: cb-example
  namespace: default
spec:
  antiAffinity: false
  baseImage: couchbase/server
  version: enterprise-5.5.0
  authSecret: basic-test-secret
  exposeAdminConsole: false
  paused: false
  disableBucketManagement: false
  logRetentionTime: "24h"
  logRetentionCount: 10
  exposedFeatureTrafficPolicy: Local
  adminConsoleServices:
      - data
      - index
      - query
      - search
  serverGroups:
    - RzaGroup-1
    - RzaGroup-2
    - RzaGroup-3
  dns:
    domain: "example.com"
  cluster:
    dataServiceMemoryQuota: 600
    indexServiceMemoryQuota: 256
    searchServiceMemoryQuota: 256
    eventingServiceMemoryQuota: 256
    analyticsServiceMemoryQuota: 1024
    indexStorageSetting: memory_optimized
    autoFailoverOnDataDiskIssuesTimePeriod: 10
    autoFailoverMaxCount: 1
    autoFailoverTimeout: 10
  buckets:
    - name: default1
      type: couchbase
      memoryQuota: 100
      replicas: 0
      ioPriority: high
      evictionPolicy: fullEviction
      conflictResolution: seqno
      enableFlush: true
      enableIndexReplica: false
    - name: default2
      type: couchbase
      memoryQuota: 100
      replicas: 0
      ioPriority: high
      evictionPolicy: valueOnly
      conflictResolution: seqno
      enableFlush: true
      enableIndexReplica: false
    - name: default3
      type: memcached
      memoryQuota: 100
      enableFlush: true
    - name: default4
      type: ephemeral
      memoryQuota: 100
      replicas: 3
      ioPriority: low
      evictionPolicy: noEviction
      conflictResolution: lww
      enableFlush: true
    - name: default5
      type: ephemeral
      memoryQuota: 100
      replicas: 3
      ioPriority: low
      evictionPolicy: nruEviction
      conflictResolution: lww
      enableFlush: true
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - analytics
        - query
        - search
        - eventing
      pod:
        volumeMounts:
          default: couchbase
    - size: 1
      name: statefull_services
      services:
        - data
        - index
        - analytics
      pod:
        volumeMounts:
          default: couchbase
          data: couchbase
          index: couchbase
          analytics:
            - couchbase
            - couchbase
    - size: 1
      name: server_groups
      services:
        - data
        - index
        - query
      pod:
        volumeMounts:
          default: couchbase
      serverGroups:
        - RzaGroup-1
        - RzaGroup-2
    - size: 1
      name: stateless_services
      services:
        - query
        - search
        - eventing
      pod:
        volumeMounts:
          logs: couchbase-log-pv
    - size: 1
      name: data_only
      services:
        - data
      pod:
        volumeMounts:
          default: couchbase
  securityContext:
    runAsUser: 1000
    runAsNonRoot: false
    fsGroup: 1000
  volumeClaimTemplates:
    - metadata:
        name: couchbase
      spec:
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
          limits:
            storage: 2Gi
    - metadata:
        name: couchbase-log-pv
      spec:
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
          limits:
            storage: 2Gi
