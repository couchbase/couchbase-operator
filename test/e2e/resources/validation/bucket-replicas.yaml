apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster
spec:
  image: couchbase/server:7.5.0
  security:
    adminSecret: cb-example-auth
    rbac:
      managed: true
  buckets:
    managed: true
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - query
        - search
        - eventing
        - analytics
  cluster:
    data:
      minReplicasCount: 2
---
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket0
spec:
  replicas: 2