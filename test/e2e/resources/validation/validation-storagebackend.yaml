apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster0
spec:
  image: couchbase/server:8.0.0
  security:
    adminSecret: cb-example-auth
    rbac:
      managed: true
  buckets:
    managed: true
    enableBucketMigrationRoutines: true
    selector:
      matchLabels:
        cluster: cluster0
  cluster:
    dataServiceMemoryQuota: 4Gi
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - query
        - search
        - eventing
        - analytics
status:
  currentVersion: 8.0.0
  size: 1
---
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster1
  annotations:
    cao.couchbase.com/buckets.defaultStorageBackend: "couchstore"
spec:
  image: couchbase/server:7.6.5
  security:
    adminSecret: cb-example-auth
    rbac:
      managed: true
  buckets:
    managed: true
    selector:
      matchLabels:
        cluster: cluster1
    enableBucketMigrationRoutines: true
  cluster:
    dataServiceMemoryQuota: 4Gi
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - query
        - search
        - eventing
        - analytics
status:
  buckets:
  - compressionMode: passive
    conflictResolution: seqno
    enableFlush: false
    enableIndexReplica: false
    evictionPolicy: fullEviction
    ioPriority: low
    memoryQuota: 100
    name: bucket80
    numVBuckets: 1024
    password: ""
    replicas: 1
    storageBackend: couchstore
    type: couchbase
  currentVersion: 7.6.5
  size: 1
---
# Moved this down here as the order in this file determines patching order.
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket1
  labels:
    cluster: cluster0
spec:
  evictionPolicy: fullEviction
  numVBuckets: 1024
  memoryQuota: 1024Mi
  historyRetention:
    collectionHistoryDefault: false
---
# bucket80 exists under cluster status. It's designed to check upgrading to 8.0.0 on non-explicit couchstore bucket.
apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket8
  labels:
    cluster: cluster1
spec:
  name: bucket80
  evictionPolicy: fullEviction