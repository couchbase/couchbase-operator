apiVersion: couchbase.com/v2
kind: CouchbaseBucket
metadata:
  name: bucket0
spec:
  evictionPolicy: fullEviction
---
apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster0
spec:
  image: couchbase/server:8.0.0
  security:
    adminSecret: cb-example-auth
    rbac:
      managed: true
  buckets:
    managed: true
  cluster:
    dataServiceMemoryQuota: 1Gi
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - query
        - search
        - eventing
        - analytics