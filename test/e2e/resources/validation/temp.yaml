apiVersion: couchbase.database.couchbase.com/v1beta1
kind: CouchbaseCluster
metadata:
  creationTimestamp: null
  name: cb-example1
  namespace: korry
spec:
  adminConsoleServices:
  - data
  - index
  - query
  - search
  authSecret: basic-test-secret
  baseImage: couchbase/server
  buckets:
  - conflictResolution: seqno
    enableFlush: true
    evictionPolicy: fullEviction
    ioPriority: high
    memoryQuota: 100
    name: default1
    type: couchbase
  - conflictResolution: seqno
    enableFlush: true
    evictionPolicy: valueOnly
    ioPriority: high
    memoryQuota: 100
    name: default2
    type: couchbase
  - enableFlush: true
    memoryQuota: 100
    name: default3
    type: memcached
  - conflictResolution: lww
    enableFlush: true
    evictionPolicy: noEviction
    ioPriority: low
    memoryQuota: 100
    name: default4
    replicas: 3
    type: ephemeral
  - conflictResolution: lww
    enableFlush: true
    evictionPolicy: nruEviction
    ioPriority: low
    memoryQuota: 100
    name: default5
    replicas: 3
    type: ephemeral
  cluster:
    analyticsServiceMemoryQuota: 0
    autoFailoverMaxCount: 0
    autoFailoverOnDataDiskIssues: false
    autoFailoverOnDataDiskIssuesTimePeriod: 0
    autoFailoverServerGroup: false
    autoFailoverTimeout: 10
    dataServiceMemoryQuota: 600
    eventingServiceMemoryQuota: 0
    indexServiceMemoryQuota: 256
    indexStorageSetting: memory_optimized
    searchServiceMemoryQuota: 256
  exposeAdminConsole: false
  servers:
  - name: all_services
    services:
    - data
    - index
    - query
    - search
    size: 1
  - name: data_only
    services:
    - data
    size: 1
  softwareUpdateNotifications: false
  version: 5.5.0-beta
status:
  buckets: null
  clusterId: ""
  controlPaused: false
  currentVersion: ""
  members: {}
  phase: ""
  reason: ""
  size: 0
