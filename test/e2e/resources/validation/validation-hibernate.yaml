apiVersion: couchbase.com/v2
kind: CouchbaseCluster
metadata:
  name: cluster
  namespace: default
spec:
  hibernate: true
  image: couchbase/server:7.6.0
  servers:
    - size: 1
      name: all_services
      services:
        - data
        - index
        - analytics
        - query
        - search
        - eventing
