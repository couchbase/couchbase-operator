---
suite: TestSanity
timeout: 4h
tcGroups:
  - name: FailureReruns
    clusters:
      - BasicCluster
    testcases:
      - name: TestNegValidationCreate
      - name: TestExtendedDebugWithNonDefaultValues
      - name: TestFailedBackupBehaviour
      - name: TestBackupAndRestore

  - name: BackupTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestFullIncremental
      - name: TestFullOnly
      - name: TestFullIncrementalOverTLS
      - name: TestFullOnlyOverTLS
      - name: TestMultipleBackups
      - name: TestBackupPVCReconcile
      - name: TestReplaceFullOnlyBackup
      - name: TestReplaceFullIncrementalBackup
      - name: TestUpdateBackupStatus
