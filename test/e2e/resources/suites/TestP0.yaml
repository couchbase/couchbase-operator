---
suite: TestP0
timeout: 12h
tcGroups:
  - name: ClusterTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestResizeClusterWithBucket
      - name: TestBasicMDSScaling
      - name: TestDenyCommunityEdition
      - name: TestAutoCompactionUpdate

  - name: BucketTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestBucketUnmanaged
      - name: TestBucketSelection

  - name: ServiceTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestEditServiceConfig
      - name: TestCreateClusterDataServiceNotFirst
      - name: TestRemoveLastDataService
      - name: TestSwapNodesBetweenServices

  - name: PodTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestPodResourcesCannotBePlaced
      - name: TestFirstNodePodResourcesCannotBePlaced
      - name: TestRemoveServerClassWithNodeService

  - name: RecoveryTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestRecoveryAfterTwoPodFailureNoBucket
      - name: TestRecoveryAfterOnePodFailureBucketOneReplica
      - name: TestRecoveryAfterTwoPodFailureBucketOneReplica
      - name: TestRecoveryAfterOnePodFailureBucketTwoReplica
      - name: TestRecoveryAfterTwoPodFailureBucketTwoReplica

  - name: AntiAffinityTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestAntiAffinityOff
      - name: TestAntiAffinityOnCannotBePlaced

  - name: OperatorTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestKillOperator
      - name: TestKillOperatorAndUpdateClusterConfig

  - name: TLS case
    clusters:
      - BasicCluster
    testcases:
      - name: TestTlsKillClusterNode
      - name: TestTlsResizeCluster
      - name: TestTLSRotate
      - name: TestTLSRotateChain
      - name: TestTLSRotateCA
      - name: TestTLSRotateInvalid
      - name: TestMutualTLSCreateCluster
      - name: TestMutualTLSEnable
      - name: TestMutualTLSDisable
      - name: TestMutualTLSRotateClient
      - name: TestMutualTLSRotateClientChain
      - name: TestMutualTLSRotateCA
      - name: TestMutualTLSRotateInvalid
      - name: TestMandatoryMutualTLSCreateCluster
      - name: TestMandatoryMutualTLSEnable
      - name: TestMandatoryMutualTLSDisable
      - name: TestMandatoryMutualTLSRotateClient
      - name: TestMandatoryMutualTLSRotateClientChain
      - name: TestMandatoryMutualTLSRotateCA
      - name: TestMandatoryMutualTLSRotateInvalid

  - name: XdcrCasesIntraCluster
    clusters:
      - BasicCluster
      - BasicCluster
    testcases:
      - name: TestXdcrCreateCluster
      - name: TestXdcrCreateTlsCluster # Must be on the same cluster for DNS resolution.

  - name: XdcrCases
    clusters:
      - BasicCluster
      - NewCluster1
    testcases:
      - name: TestXdcrSourceNodeDown
      - name: TestXdcrSourceNodeAdd
      - name: TestXdcrTargetNodeServiceDelete

  - name: RzaTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestRzaResizeCluster

  - name: PersistentVolumeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestPersistentVolumeAutoFailover
      - name: TestPersistentVolumeNodeFailover

  - name: FailoverTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestServerGroupAutoFailover
      - name: TestMultiNodeAutoFailover

  - name: AnalyticsTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestAnalyticsResizeCluster

  - name: SupportabilityTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestNegLogCollectValidateArgs
      - name: TestLogCollect
      - name: TestExtendedDebugWithNonDefaultValues
      - name: TestCollectLogFromEphemeralPodsUsingLogPVKillProcess
      - name: TestLogRedactionWithPvVerify
      - name: TestLogCollectListJson

  - name: UpgradeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestUpgradeInvalidDowngrade
      - name: TestUpgradeInvalidUpgrade
      - name: TestUpgrade
      - name: TestUpgradeSupportableKillStatefulPodOnCreate
      - name: TestUpgradeSupportableKillStatefulPodOnRebalance

  - name: NetworkingTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestExposedFeatureIP
      - name: TestExposedFeatureDNS
      - name: TestExposedFeatureDNSModify
      - name: TestExposedFeatureServiceTypeModify
      - name: TestConsoleServiceDNS
      - name: TestConsoleServiceDNSModify
      - name: TestConsoleServiceTypeModify
