---
suite: TestP0
timeout: 8h
tcGroups:
  - name: ClusterTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestCreateCluster
      - name: TestCreateBucketCluster
      - name: TestResizeCluster
      - name: TestResizeClusterWithBucket
      - name: TestEditClusterSettings
      - name: TestNegEditClusterSettings
      - name: TestBasicMDSScaling

  - name: BucketTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestBucketAddRemoveBasic
      - name: TestEditBucket
      - name: TestNegBucketAdd
      - name: TestNegBucketEdit

  - name: ServiceTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestEditServiceConfig
      - name: TestNegEditServiceConfig
      - name: TestCreateClusterWithoutDataService
      - name: TestCreateClusterDataServiceNotFirst
      - name: TestRemoveLastDataService
      - name: TestSwapNodesBetweenServices

  - name: PodTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestPodResourcesBasic
      - name: TestPodResourcesCannotBePlaced
      - name: TestFirstNodePodResourcesCannotBePlaced

  - name: RecoveryTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestRecoveryAfterOnePodFailureNoBucket
      - name: TestRecoveryAfterTwoPodFailureNoBucket
      - name: TestRecoveryAfterOnePodFailureBucketOneReplica
      - name: TestRecoveryAfterTwoPodFailureBucketOneReplica
      - name: TestRecoveryAfterOnePodFailureBucketTwoReplica
      - name: TestRecoveryAfterTwoPodFailureBucketTwoReplica

  - name: AntiAffinityTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestAntiAffinityOn
      - name: TestAntiAffinityOff
      - name: TestAntiAffinityOnCannotBePlaced

  - name: OperatorTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestKillOperator
      - name: TestKillOperatorAndUpdateClusterConfig

  - name: TLS case
    clusters:
      - BasicCluster
    testcases:
      - name: TestTlsCreateCluster
      - name: TestTlsKillClusterNode
      - name: TestTlsResizeCluster
      - name: TestTLSRotate
      - name: TestTLSRotateChain
      - name: TestTLSRotateCA
      - name: TestTLSRotateInvalid

  - name: XdcrCasesIntraCluster
    clusters:
      - BasicCluster
      - BasicCluster
    testcases:
      - name: TestXdcrCreateCluster

  - name: XdcrCases
    clusters:
      - BasicCluster
      - NewCluster1
    testcases:
      - name: TestXdcrCreateCluster
      - name: TestXdcrCreateTlsCluster
      - name: TestXdcrCreateK8SVMCluster
      - name: TestXdcrNodeDownDuringSetupDuringConfigure
      - name: TestXdcrNodeDownDuringSetupAfterConfigure
      - name: TestXdcrNodeAddDuringSetupDuringConfigure
      - name: TestXdcrNodeAddDuringSetupAfterConfigure
      - name: TestXdcrNodeServiceKilledDuringConfigure
      - name: TestXdcrNodeServiceKilledAfterConfigure

  - name: RzaTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestRzaCreateClusterWithStaticConfig
      - name: TestRzaCreateClusterWithClassBasedConfig
      - name: TestRzaResizeCluster

  - name: PersistentVolumeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestPersistentVolumeCreateCluster
      - name: TestPersistentVolumeAutoFailover
      - name: TestPersistentVolumeNodeFailover

  - name: FailoverTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestServerGroupAutoFailover
      - name: TestServerGroupWithSingleServiceNodeInFailoverGroup
      - name: TestMultiNodeAutoFailover
      - name: TestDiskFailureAutoFailover

  - name: AnalyticsTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestAnalyticsCreateDataSet
      - name: TestAnalyticsResizeCluster

  - name: EventingTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestEventingCreateEventingCluster

  - name: SupportabilityTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestLogCollectValidateArguments
      - name: TestNegLogCollectValidateArgs
      - name: TestLogCollectUsingClusterNameAndNamespace
      - name: TestExtendedDebugWithDefaultValues
      - name: TestExtendedDebugWithNonDefaultValues
      - name: TestCollectLogFromEphemeralPodsUsingLogPV
      - name: TestCollectLogFromPvPodRecovered
      - name: TestLogCollectWithDefaultRetentionAndSize
      - name: TestLogRedactionVerify
      - name: TestLogRedactionWithPvVerify

  - name: UpgradeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestUpgradeInvalidDowngrade
      - name: TestUpgradeInvalidUpgrade
      - name: TestUpgrade
      - name: TestUpgradeSupportableKillStatefulPodOnCreate
      - name: TestUpgradeSupportableKillStatefulPodOnRebalance
