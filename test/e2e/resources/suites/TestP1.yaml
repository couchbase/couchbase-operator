---
suite: TestP1
timeout: 16h
tcGroups:
  - name: ClusterTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestInvalidBaseImage
      - name: TestInvalidVersion
      - name: TestManageMultipleClusters

  - name: NodeTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestNodeUnschedulable
      - name: TestNodeServiceDownRecovery
      - name: TestNodeServiceDownDuringRebalance
      - name: TestNodeManualFailover
      - name: TestKillNodesAfterRebalanceAndFailover
      - name: TestRemoveForeignNode
      - name: TestReplaceManuallyRemovedNode

  - name: RecoveryTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestNodeRecoveryAfterMemberAdd
      - name: TestNodeRecoveryKilledNewMember
      - name: TestRecoveryAfterOneNsServerFailureBucketOneReplica
      - name: TestRecoveryAfterOneNodeUnreachableBucketOneReplica
      - name: TestRecoveryNodeTmpUnreachableBucketOneReplica

  - name: AntiAffinityTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestAntiAffinityOnCannotBeScaled

  - name: BucketTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestBucketAddRemoveExtended
      - name: TestRevertExternalBucketUpdates
      - name: TestDeltaRecoveryImpossible

  - name: OperatorTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestPauseOperator

  - name: PodTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestNegPodResourcesBasic

  - name: TlsTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestTlsRemoveOperatorCertificateAndAddBack
      - name: TestTlsRemoveClusterCertificateAndAddBack
      - name: TestTlsRemoveOperatorCertificateAndResizeCluster
      - name: TestTlsRemoveClusterCertificateAndResizeCluster
      - name: TestTlsNegRSACertificateDnsName
      - name: TestTlsCertificateExpiry
      - name: TestTlsNegCertificateExpiredBeforeDeployment
      - name: TestTlsCertificateDeployedBeforeValidity
      - name: TestTlsGenerateWrongCACertType
      - name: TestTLSRotateCAAndScale
      - name: TestTLSRotateCAAndKillOperator

  - name: SupportableTlsTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestTLSRotateCAKillPodAndKillOperator

  - name: XdcrCases
    clusters:
      - BasicCluster
      - NewCluster1
    testcases:
      - name: TestXDCRPauseReplication
      - name: TestXdcrRebalanceOutSourceClusterNodes
      - name: TestXdcrRebalanceOutTargetClusterNodes
      - name: TestXdcrRemoveSourceClusterNodes
      - name: TestXdcrRemoveTargetClusterNodes
      - name: TestXdcrResizedOutSourceClusterNodes
      - name: TestXdcrResizedOutTargetClusterNodes
      - name: TestXDCRDeleteReplication
      - name: TestXDCRFilterExp

  - name: RzaTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestRzaAntiAffinityOn
      - name: TestRzaAntiAffinityOff

  - name: PersistentVolumeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestPersistentVolumeKillAllPods
      - name: TestPersistentVolumeKillPodAndOperator
      - name: TestPersistentVolumeKillAllPodsAndOperator
      - name: TestPersistentVolumeRzaNodesKilled
      - name: TestPersistentVolumeRzaNodesKilledUnbalanced
      - name: TestPersistentVolumeRzaFailover
      - name: TestPersistentVolumeResizeCluster

  # May be fixed in 6.0.4+
  #- name: AnalyticsTests
  #  clusters:
  #    - BasicCluster
  #  testcases:
  #    - name: TestAnalyticsKillPods
  #    - name: TestAnalyticsKillPodsWithPVC

  - name: EventingTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestEventingResizeCluster
      - name: TestEventingKillEventingPods

  - name: SupportabilityTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestLogCollectRbacPermission
      - name: TestLogCollectInvalid
      - name: TestExtendedDebugKillOperatorDuringLogCollection
      - name: TestCollectLogFromEphemeralPodsWithOperatorKilled
      - name: TestCollectLogFromEphemeralPodsWithOperatorKilledKillProcess
      - name: TestEphemeralLogCollectResizeCluster
      - name: TestLogCollectWithClusterResizeAndServerPodKilled
      - name: TestLogCollectWithCustomRetentionAndSize

  - name: UpgradeTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestUpgradeSupportableKillStatelessPodOnCreate
      - name: TestUpgradeSupportableKillStatelessPodOnRebalance
      - name: TestUpgradeRollback
      - name: TestUpgradeKillPodOnCreate
      - name: TestUpgradeInvalidRollback
      - name: TestUpgradeSupportable
      - name: TestUpgradeEnv
      - name: TestUpgradeToSupportable
      - name: TestUpgradeToTLS
      - name: TestUpgradePVC

  - name: StatusTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestStatusRecovery

  - name: RBACTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestRBACRemoveUserFromBinding
      - name: TestRBACDeleteBinding
      - name: TestRBACWithLDAPAuth
      - name: TestRBACSelection

  - name: LDAPTests
    clusters:
      - NewCluster1
    testcases:
      - name: TestLDAPRemoveUserFromBinding
      - name: TestLDAPDeleteBinding

  - name: AutomatedBackupTests
    clusters:
      - BasicCluster
    testcases:
      - name: TestFailedBackupBehaviour
      - name: TestBackupPVCReconcile
      - name: TestReplaceFullOnlyBackup
      - name: TestReplaceFullIncrementalBackup
      - name: TestUpdateBackupStatus