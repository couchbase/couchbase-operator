---
# If specified this specifies credentials to access a private docker registry.
# This will attach a "pull secret" to operator and admission controller depoyment
# specs that allow the images to be pulled.
#docker-server: "https://index.docker.io/v1/"
#docker-username: "couchbase-test"
#docker-password: "password"

# Container images to use for testing
operator-image: couchbase/couchbase-operator:v1
admission-controller-image: couchbase/couchbase-operator-admission:v1

# Cluster namespace to run the tests
namespace: default

# Deployment yaml file path
deployment-spec: ../../example/deployment.yaml

# cluster config file path
cluster-config: resources/cluster_conf.yaml

# List of Cluster KUBECONFIG to be used during tests, if not cluster will be formed using cluster-config data
kube-config:
  #- name: Cluster1
  #  config: ~/.kube/config
  #- name: Cluster2
  #  config: ~/.kube/config_new

# Collect cluster logs when test case fails using cbopinfo tool
collectLogsOnFailure: false

# If true, operator and server images will be pulled to all k8s nodes
pullDockerImages: false

# Leaves the operator running after tests
skip-tear-down: true

# Test suite to run. Same named yaml file should exists in resources/suites path
suite: TestNone

# Couchbase server docker image to use
cbServerBaseImage: couchbase/server

# Couchbase server image docker version to use
cbServerImageVersion: enterprise-5.5.0

# Couchbase server version to upgrade to
cbServerImageVersionUpgrade: enterprise-6.0.0

# Cluster type kubernetes | aws-openshift
kube-type: kubernetes

# KUBE version to install
kube-version: 1.10.5-0

# Storage class defined in cluster to use for PV cases
StorageClassName: standard

# Service account to use while running Tests
serviceAccountName: default

# custom, azure
platformType: custom
