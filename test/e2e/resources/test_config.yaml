---
# If specified this specifies credentials to access a private docker registry.
# This will attach a "pull secret" to operator and admission controller depoyment
# specs that allow the images to be pulled.
#registries:
#- server: "https://index.docker.io/v1/"
#  username: "couchbase-test"
#  password: "password"

# Container images to use for testing
operator-image: couchbase/couchbase-operator:v1
admission-controller-image: couchbase/couchbase-operator-admission:v1

# Cluster namespace to run the tests
namespace: default

# List of Cluster KUBECONFIG to be used during tests.
kube-config:
  #- name: Cluster1
  #  namespace: default
  #  config: ~/.kube/config
  #- name: Cluster2
  #  namespace: default
  #  config: ~/.kube/config_new

# Collect cluster logs when test case fails using cbopinfo tool
collectLogsOnFailure: false

# Leaves the operator running after tests
skip-tear-down: true

# Test suite to run. Same named yaml file should exists in resources/suites path
suite: TestNone

# Couchbase server image to use
couchbase-server-image: couchbase/server:enterprise-5.5.0

# Couchbase server image to upgrade to
couchbase-server-image-upgrade: couchbase/server:enterprise-6.0.0

# Cluster type kubernetes | openshift
kube-type: kubernetes

# Storage class defined in cluster to use for PV cases
StorageClassName: standard

# Service account to use while running Tests
serviceAccountName: default

# Couchbase backup image to use
couchbase-backup-image: couchbase/operator-backup:6.5.0

# Couchbase Exporter image to use
couchbase-exporter-image: couchbase/exporter:1.0.1
