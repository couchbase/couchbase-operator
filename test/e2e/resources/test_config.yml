---
operator-image: couchbase/couchbase-operator:v1               # Operator image to use for testing
namespace: default                                            # Cluster namespace to run the tests
deployment-spec: couchbase-operator/example/deployment.yaml   # Deployment yaml file path
cluster-config: resources/cluster_config.yml                  # cluster config file path

kube-config:                    # List of Cluster KUBECONFIG to be used during tests, if not cluster will be formed using cluster-config data
  - name: BasicCluster
    config: /root/.kube/config
duration: 7                     # In days. Used for system tests
skip-tear-down: false           # Leaves the operator running after tests
suite: TestSanity               # Test suite to run. Same named yaml file should exists in resources/suites path
kube-type: kubernetes           # Cluster type kubernetes | aws-openshift
kube-version: 1.8.0-0           # KUBE version to install

serviceAccountName: couchbase-operator    # Service account to use while running Tests
