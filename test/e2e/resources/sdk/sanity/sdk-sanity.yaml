---
apiVersion: batch/v1
kind: Job
metadata:
  name: sdk-sanity
spec:
  template:
    metadata:
      name: sdk-sanity
    spec:
      containers:
      - name: sdk-sanity
        image: dockerhub.build.couchbase.com/sdkd-java-client:test
        env:
          - name: NODE1
            value: "cb-example-0000.cb-example.default.svc"
          - name: NODE2
            value: "cb-example-0001.cb-example.default.svc"
          - name: NODE3
            value: "cb-example-0002.cb-example.default.svc"
          - name: NODE4
            value: "cb-example-0003.cb-example.default.svc"
        args: ["-I", "k8s-basic.ini", "--install-skip=true", "--bucket-password=password",
               "--basic-wait=600", "--testsuite-variants=HYBRID", "--testsuite-test=passthrough",
               "-d", "all:debug", "-A", "S3Creds_tmp", "-C", "share/rexec",
               "--rexec_path=/root/sdkd-java/run-sdkd-java", "--rexec-port", "8050"]
      restartPolicy: Never
