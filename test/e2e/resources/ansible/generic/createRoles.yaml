- hosts: master_node
  vars:
    clusterRoleValue: "couchbase-operator"

  tasks:
    - name: Copying cluster-role yaml
      copy:
        src: cluster-role-template.yaml
        dest: ~/.kube/cluster-role.yaml

    - name: Editing role name in cluster-role yaml
      replace:
        path: ~/.kube/cluster-role.yaml
        regexp: '<ROLE_NAME>'
        replace: "{{ clusterRoleValue }}"

    - name: Cleaning up previous cluster role
      shell: kubectl delete -f ~/.kube/cluster-role.yaml
      ignore_errors: yes

    - name: Removing old couchbase-operator service account
      shell: "kubectl delete serviceaccount couchbase-operator --namespace {{ namespace }}"
      ignore_errors: yes

    - name: Removing old couchbase-operator clusterrolebinding
      shell: "kubectl delete clusterrolebinding couchbase-operator-{{ namespace }}"
      ignore_errors: yes

    - name: Removing old default service account
      shell: "kubectl delete serviceaccount default --namespace {{ namespace }}"
      ignore_errors: yes

    - name: Removing old default clusterrolebinding
      shell: "kubectl delete clusterrolebinding default-{{ namespace }}"
      ignore_errors: yes

    - name: Creating cluster role
      shell: kubectl create -f ~/.kube/cluster-role.yaml

    - name: Creating couchbase-operator service account
      shell: "kubectl create serviceaccount couchbase-operator --namespace {{ namespace }}"

    - name: Creating couchbase-operator clusterrolebinding
      shell: "kubectl create clusterrolebinding couchbase-operator-{{ namespace }} --clusterrole couchbase-operator --serviceaccount {{ namespace }}:couchbase-operator"

    - name: Creating default clusterrolebinding
      shell: "kubectl create clusterrolebinding default-{{ namespace }} --clusterrole couchbase-operator --serviceaccount {{ namespace }}:default"
