- hosts: master_node
  vars:
    etcdLibPath: /var/lib/etcd
    kubeConfigDir: ~/.kube

  tasks:
    - name: Drain all nodes
      shell: kubectl drain --all --delete-local-data --force --ignore-daemonsets
      ignore_errors: yes

    - name: Delete all nodes
      shell: kubectl delete node --all
      ignore_errors: yes

- hosts: all
  vars:
    k8sConfFile: /etc/sysctl.d/k8s.conf
    k8sConfFileContent: "net.bridge.bridge-nf-call-ip6tables = 1\nnet.bridge.bridge-nf-call-iptables = 1\n"

  tasks:

    - name: Installing required packages
      yum: state=present name={{ item }}
      with_items:
        - "yes"
      ignore_errors: yes

    - name: Resetting kubeadm
      shell: "'yes' | kubeadm reset"
      ignore_errors: no

    - name: Deleteing docker images
      shell: "'yes' | docker system prune -a"
      ignore_errors: no

    - name: Adding Kubernetes repo
      yum_repository:
        name: Kubernetes
        description: Kubernetes repo
        file: kubernetes
        baseurl: https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64
        enabled: yes
        gpgcheck: no
        repo_gpgcheck: no
        gpgkey: https://packages.cloud.google.com/yum/doc/yum-key.gpg https://packages.cloud.google.com/yum/doc/rpm-package-key.gp
      register: kuberepo

    - name: Commenting swap volume in /etc/fstab
      shell: sed -i.bak '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: Turning off swap partition
      shell: swapoff -a

    - name: Disabling SELinux
      lineinfile:
        dest: /etc/sysconfig/selinux
        regexp: 'SELINUX=.*$'
        line: 'SELINUX=disabled'

    - name: setenforce to 0
      shell: setenforce 0
      ignore_errors: yes

    - name: Editing k8s config for ipv4 network bridge
      lineinfile: dest={{ k8sConfFile }} line={{ item }}
      with_items:
        - net.bridge.bridge-nf-call-ip6tables = 1
        - net.bridge.bridge-nf-call-iptables = 1

    - name: Stopping firewall
      shell: systemctl stop firewalld.service

    - name: Disabling firewall
      shell: systemctl disable firewalld

    - name: Masking firewall
      shell: systemctl mask firewalld.service

    - name: Load sysctl data
      shell: sysctl --system

    - name: Rebooting host
      shell: 'shutdown -r +1 "Reboot triggered by Ansible"'
      async: yes
 
    - wait_for_connection:
        delay: 90
        timeout: 300

    - name: reset | stop services
      service:
        name: "{{ item }}"
        state: stopped
      with_items:
        - kubelet
        - vault
        - etcd
        - etcd-events
      failed_when: false
      tags:
        - services

    - name: reset | remove services
      file:
        path: "/etc/systemd/system/{{ item }}.service"
        state: absent
      with_items:
        - kubelet
        - etcd
        - etcd-events
        - vault
        - calico-node
      register: services_removed
      tags:
        - services

    - name: reset | remove docker dropins
      file:
        path: "/etc/systemd/system/docker.service.d/{{ item }}"
        state: absent
      with_items:
        - docker-dns.conf
        - docker-options.conf
        - http-proxy.conf
      register: docker_dropins_removed
      tags:
        - docker

    - name: reset | systemctl daemon-reload
      command: systemctl daemon-reload
      when: services_removed.changed or docker_dropins_removed.changed

    - name: reset | remove all containers
      shell: "docker ps -aq | xargs -r docker rm -fv"
      register: remove_all_containers
      retries: 4
      until: remove_all_containers.rc == 0
      delay: 5
      tags:
        - docker

    - name: reset | restart docker if needed
      service:
        name: docker
        state: restarted
      when: docker_dropins_removed.changed
      tags:
        - docker

    - name: reset | gather mounted kubelet dirs
      shell: mount | grep /var/lib/kubelet/ | awk '{print $3}' | tac
      check_mode: no
      register: mounted_dirs
      tags:
        - mounts

    - name: reset | unmount kubelet dirs
      command: umount {{item}}
      with_items: '{{ mounted_dirs.stdout_lines }}'
      register: umount_dir
      retries: 4
      until: umount_dir.rc == 0
      delay: 5
      tags:
        - mounts

    - name: flush iptables
      iptables:
        table: "{{ item }}"
        flush: yes
      with_items:
        - filter
        - nat
      tags:
        - iptables

    - name: reset | delete some files and directories
      file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{kube_config_dir}}"
        - /var/lib/kubelet
        - /root/.kube
        - /root/.helm
        - "{{ etcd_data_dir }}"
        - /var/lib/etcd-events
        - /etc/ssl/etcd
        - /var/log/calico
        - /etc/cni
        - /etc/nginx
        - /etc/dnsmasq.d
        - /etc/dnsmasq.conf
        - /etc/dnsmasq.d-available
        - /etc/etcd.env
        - /etc/calico
        - /etc/weave.env
        - /opt/cni
        - /etc/dhcp/dhclient.d/zdnsupdate.sh
        - /etc/dhcp/dhclient-exit-hooks.d/zdnsupdate
        - /run/flannel
        - /etc/flannel
        - /run/kubernetes
        - /usr/local/share/ca-certificates/etcd-ca.crt
        - /usr/local/share/ca-certificates/kube-ca.crt
        - /usr/local/share/ca-certificates/vault-ca.crt
        - /etc/ssl/certs/etcd-ca.pem
        - /etc/ssl/certs/kube-ca.pem
        - /etc/ssl/certs/vault-ca.crt
        - /etc/pki/ca-trust/source/anchors/etcd-ca.crt
        - /etc/pki/ca-trust/source/anchors/kube-ca.crt
        - /etc/pki/ca-trust/source/anchors/vault-ca.crt
        - /etc/vault
        - /var/log/pods/
        - "{{ bin_dir }}/kubelet"
        - "{{ bin_dir }}/etcd-scripts"
        - "{{ bin_dir }}/etcd"
        - "{{ bin_dir }}/etcd-events"
        - "{{ bin_dir }}/etcdctl"
        - "{{ bin_dir }}/kubernetes-scripts"
        - "{{ bin_dir }}/kubectl"
        - "{{ bin_dir }}/kubeadm"
        - "{{ bin_dir }}/helm"
        - "{{ bin_dir }}/calicoctl"
        - "{{ bin_dir }}/weave"
        - /var/lib/rkt
        - /etc/vault
      ignore_errors: yes
      tags:
        - files

    - name: reset | remove dns settings from dhclient.conf
      blockinfile:
        dest: "{{ item }}"
        state: absent
        follow: yes
        marker: "# Ansible entries {mark}"
      failed_when: false
      with_items:
        - /etc/dhclient.conf
        - /etc/dhcp/dhclient.conf
      tags:
        - files
        - dns

    - name: reset | remove host entries from /etc/hosts
      blockinfile:
        dest: "/etc/hosts"
        state: absent
        follow: yes
        marker: "# Ansible inventory hosts {mark}"
      tags:
        - files
        - dns

    - name: reset | Restart network
      service:
        name:
          network
        state: restarted
      tags:
        - services
        - network

    - name: Removing hosts data from /etc/hosts
      lineinfile:
        path: /etc/hosts
        state: absent
        regexp: " k8s.*$"

    - name: Removing old kube packages
      yum: state=absent name={{ item }}
      with_items:
        - kubectl
        - kubeadm
        - kubelet
        - cri-tools

    - name: Installing kubelet package
      yum:
        state: present
        name: kubelet-{{ kubeVersion }}.x86_64

    - name: Installing required packages
      yum: state=present name={{ item }}
      with_items:
        - docker
        - kubectl-{{ kubeVersion }}.x86_64
        - kubeadm-{{ kubeVersion }}.x86_64

    - name: Creating k8s config file
      file:
        path: "{{ k8sConfFile }}"
        state: touch

    - name: Reloading systemctl deamon
      shell: systemctl daemon-reload

    - name: Enabling docker service
      shell: systemctl enable docker 

    - name: Starting docker
      shell: systemctl restart docker

    - name: Enabling Kubelet service
      shell: systemctl enable kubelet

    - name: Starting Kubelet service
      shell: systemctl restart kubelet

