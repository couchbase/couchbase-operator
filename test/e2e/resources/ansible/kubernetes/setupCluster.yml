- hosts: master_node
  vars:
    etcdLibPath: /var/lib/etcd
    kubeConfigDir: ~/.kube

  tasks:
    - name: Resetting kubeadm
      shell: kubeadm reset

    - name: Cleaning up old etcd data
      file:
        state: absent
        path: "{{ item }}/"
      with_items:
        - "{{ etcdLibPath }}"
        - "{{ kubeConfigDir }}"

    - name: Generating kubeadm token
      shell: kubeadm token generate
      run_once: True
      register: shellOutput

    - set_fact:
        kubeAdmToken: "{{ shellOutput.stdout }}"
        masterNodeIp: "{{ inventory_hostname }}"

    - add_host:
        name: myVars
        kubeAdmToken: "{{ shellOutput.stdout }}"
        masterNodeIp: "{{ inventory_hostname }}"        

    - name: Initializing master node
      shell: "kubeadm init --token {{ kubeAdmToken }}"

    - name: Creating kube config dir
      file:
        path: "{{ kubeConfigDir }}"
        state: directory

    - name: Copying Kube config
      copy:
        remote_src: true
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubeConfigDir }}/config"

    - name: Chmod for config
      shell: "chown $(id -u):$(id -g) {{ kubeConfigDir }}/config"

    - name: Fetching kube config
      fetch: 
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubeConfPathToSave }}"
        flat: yes

- hosts: worker_node
  tasks:
    - set_fact:
        kubeAdmToken: "{{ hostvars['myVars']['kubeAdmToken'] }}"
        masterNodeIp: "{{ hostvars['myVars']['masterNodeIp'] }}"

    - name: Resetting kubeadm
      shell: kubeadm reset

    - name: Joining worker nodes
      shell: "kubeadm join --token {{ kubeAdmToken }} {{ masterNodeIp }}:6443"

- hosts: master_node
  tasks:
    - name: Applying cluster network settings using weave
      shell: kubectl apply -f "https://cloud.weave.works/k8s/net?k8s-version=$(kubectl version | base64 | tr -d '\n')"

    - name: Getting node deatils
      shell: kubectl get nodes -o wide
      register: shellOutput

    - debug:
        msg: "{{ shellOutput.stdout }}"
